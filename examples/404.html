<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Tomato CSS</title>
    <meta name="description" content="The page you're looking for doesn't exist.">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.svg">

    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#f43f5e">

    <style>
        :root {
            --bg: #050505;
            --primary: #f43f5e;
            --secondary: #fb923c;
            --text-main: #ededed;
            --text-secondary: #a1a1aa;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(244, 63, 94, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 100%, rgba(251, 146, 60, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 480px;
            text-align: center;
        }

        .tomato {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            display: block;
        }

        .code {
            font-family: var(--font-code);
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: stretch;
        }

        a.btn {
            display: inline-block;
            padding: 0.85rem 1.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        a.btn:hover {
            transform: translateY(-1px);
        }

        .primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .primary:hover {
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.4);
        }

        .secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        a:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <main class="container">
        <svg class="tomato" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <defs>
                <radialGradient id="b" cx="35%" cy="32%" r="68%">
                    <stop offset="0%" stop-color="#fb7185"/>
                    <stop offset="50%" stop-color="#f43f5e"/>
                    <stop offset="100%" stop-color="#9f1239"/>
                </radialGradient>
                <linearGradient id="l" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#4ade80"/>
                    <stop offset="100%" stop-color="#15803d"/>
                </linearGradient>
            </defs>
            <circle cx="32" cy="38" r="22" fill="url(#b)"/>
            <ellipse cx="24" cy="30" rx="7" ry="4" fill="#fff" fill-opacity="0.38"/>
            <rect x="30.5" y="2" width="3" height="9" rx="1.5" fill="#15803d"/>
            <path d="M32 17 C 22 14, 12 15, 10 20 C 14 23, 24 22, 32 19 Z" fill="url(#l)"/>
            <path d="M32 17 C 42 14, 52 15, 54 20 C 50 23, 40 22, 32 19 Z" fill="url(#l)"/>
            <path d="M32 18 C 28 22, 18 23, 16 21 C 19 19, 27 18, 32 18 Z" fill="#166534"/>
            <path d="M32 18 C 36 22, 46 23, 48 21 C 45 19, 37 18, 32 18 Z" fill="#166534"/>
        </svg>

        <div class="code">404</div>
        <h1>This page doesn't exist</h1>
        <p>The link may be broken, the page may have moved, or you may have typed the URL wrong.</p>

        <nav class="links" aria-label="404 navigation">
            <a class="btn primary" href="/">Back to Home</a>
            <a class="btn secondary" href="docs.html">Read the Docs</a>
        </nav>
    </main>
</body>
</html>
